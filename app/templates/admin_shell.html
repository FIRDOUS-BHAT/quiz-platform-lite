{% extends "base.html" %}
{% block body_class %}admin-page{% endblock %}
{% block content %}
<section class="surface admin-nav-shell">
  <div>
    <span class="eyebrow">Admin Panel</span>
    <h2>Administration</h2>
  </div>
  <nav class="admin-subnav" aria-label="Admin sections">
    {% for item in admin_nav_items %}
      <a class="admin-tab{% if admin_section == item.key %} active{% endif %}" href="{{ item.href }}">{{ item.label }}</a>
    {% endfor %}
  </nav>
</section>
{% block admin_content %}{% endblock %}
{% endblock %}
