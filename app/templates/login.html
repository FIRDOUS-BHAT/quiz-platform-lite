{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-layout">
  <section class="auth-aside">
    <span class="eyebrow">Student Portal</span>
    <h1>Sign in to your student account.</h1>
    <p class="hero-lead">Start a test, resume an attempt, or check your results.</p>
  </section>

  <section class="auth-panel">
    <div>
      <h2>Sign In</h2>
    </div>
    <form method="post" action="/app/login" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit">Sign In →</button>
      <div class="form-note">
        New student? <a href="/app/register" class="text-link">Register here</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
