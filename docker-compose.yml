services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiz}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-5}
      POSTGRES_MAX_OVERFLOW: ${POSTGRES_MAX_OVERFLOW:-10}
      POSTGRES_POOL_RECYCLE: ${POSTGRES_POOL_RECYCLE:-1800}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-}
      POSTGRES_SSLROOTCERT: ${POSTGRES_SSLROOTCERT:-}
      API_PORT: 8000
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-quiz_platform_session}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-43200}
      ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-true}
      CSRF_SECRET_KEY: ${CSRF_SECRET_KEY:-CHANGE-ME-TO-A-RANDOM-STRING}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10}
      RATE_LIMIT_REGISTER: ${RATE_LIMIT_REGISTER:-5}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-120}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me-admin}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Platform Admin}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
